<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Login</title>
</head>
<body>
    <video src="video/cars.mp4" autoplay loop muted playsinline></video>
    <div class="container d-flex justify-content-center align-items-center min-vh-100 px-3">
        <div class="row border rounded-5 p-3 auth-card" style="background: rgba(0,0, 0,0.507);">

            <!--Login-->
            <div class="col-12 p-4 p-md-5" id="login-section">
                <div class="row align-items-center">
                    <form class="mb-4 text-light" id="loginForm" novalidate>
                        <div class="text-center mb-5">
                            <h3 class="fw-bold">Login</h3>
                            <p>Bem Vindo</p>
                        </div>
                        <div class="input-group mb-2">
                            <span class="input-group-text">
                                <ion-icon name="mail-outline"></ion-icon>
                            </span>
                            <input type="email" id="loginEmail" class="form-control form-control-lf fs-6" placeholder="Email" required>
                            <div class="invalid-feedback">Informe um email válido.</div>
                        </div>
                        <div class="input-group mb-2">
                            <span class="input-group-text">
                            <ion-icon name="lock-closed-outline"></ion-icon>
                            </span>
                            <input type="password" id="loginSenha" class="form-control form-control-lf fs-6" placeholder="Senha" required minlength="4">
                            <div class="invalid-feedback">Informe a senha (mínimo 4 caracteres).</div>
                        </div>
                        <div class="input-group mb-5 d-flex justify-content-between">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="form-check-input">
                                <label class="form-check-label" for="form-check-input">Lembrar</label>
                            </div>
                            <div>
                                <small><a href="#" class="text-light text-decoration-none">Alterar senha</a></small>
                            </div>
                        </div>
                        <div class="input-group mb-3">
                            <button type="submit" class="btn btn-lg btn-primary w-100 fs-6">Entrar</button>
                        </div>
                        <div class="row">
                            <small>Não tem conta? <a href="#" id="showCadastro" class="text-light">Cadastrar</a></small>
                        </div>
                    </form>
                </div>
            </div>

            <!--Cadastro-->
            <div class="col-12 p-4 p-md-5 d-none" id="cadastro-section">
                <div class="row align-items-center">
                    <form class="mb-4 text-light" id="cadastroForm" novalidate>
                        <div class="text-center mb-5">
                            <h3 class="fw-bold">Cadastro</h3>
                            <p>Crie sua conta</p>
                        </div>
                        <div class="input-group mb-2">
                            <span class="input-group-text">
                                <ion-icon name="person-outline"></ion-icon>
                            </span>
                            <input type="text" id="cadastroNome" class="form-control form-control-lf fs-6" placeholder="Nome" required>
                            <div class="invalid-feedback">Informe seu nome.</div>
                        </div>
                        <div class="input-group mb-2">
                            <span class="input-group-text">
                                <ion-icon name="mail-outline"></ion-icon>
                            </span>
                            <input type="email" id="cadastroEmail" class="form-control form-control-lf fs-6" placeholder="Email" required>
                            <div class="invalid-feedback">Informe um email válido.</div>
                        </div>
                        <div class="input-group mb-5">
                            <span class="input-group-text">
                                <ion-icon name="lock-closed-outline"></ion-icon>
                            </span>
                            <input type="password" id="cadastroSenha" class="form-control form-control-lf fs-6" placeholder="Senha" required minlength="4">
                            <div class="invalid-feedback">A senha deve ter ao menos 4 caracteres.</div>
                        </div>
                        <div class="input-group mb-3">
                            <button type="submit" class="btn btn-lg btn-primary w-100 fs-6">Cadastrar</button>
                        </div>
                        <div class="row">
                            <small>Já tem conta? <a href="#" id="showLogin" class="text-light">Entrar</a></small>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
<!--Icon-->
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
<!--Boostrap-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<!--Script-->
<script src="script.js"></script>
</body>
</html>
